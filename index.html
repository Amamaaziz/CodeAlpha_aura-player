<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Stream — Premium Audio Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="music.css">
</head>
<body>

<div class="mesh-bg-container">
    <div class="mesh-blob blob-1"></div>
    <div class="mesh-blob blob-2"></div>
    <div class="mesh-blob blob-3"></div>
</div>
<div class="vignette-overlay"></div>

<div class="player-wrapper">
    <div class="player-card">
        <header class="player-header">
            <button class="icon-btn" aria-label="Minimize player interface"><i class="fa-solid fa-angle-left"></i></button>
            <h1 class="header-title">Now Playing</h1>
            <button class="icon-btn" aria-label="Open streaming playlist"><i class="fa-solid fa-bars"></i></button>
        </header>
        
        <div class="track-artwork-wrapper">
            <div class="artwork-disk-outer" id="diskWrapper">
                <img src="musicplayer.jpg" id="cover" alt="Album Art Stream Node" onerror="this.src='https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=400&auto=format&fit=crop'">
            </div>
            <div class="ambient-glow-ring"></div>
        </div>
        
        <div class="track-metadata">
            <h2 id="title">Song Title</h2>
            <p id="artist">Artist Name</p>
        </div>

        <audio id="song">
            <source src="">
        </audio>
        
        <div class="timeline-container">
            <input type="range" value="0" id="progress" min="0" step="0.1" aria-label="Track playback timeline position slider">
            <div class="time-display">
                <span id="currentTime" class="mono-font">0:00</span>
                <span id="durationTime" class="mono-font">0:00</span>
            </div>
        </div>
        
        <div class="control-panel">
            <button onclick="prevSong()" class="control-btn secondary-btn" aria-label="Skip to previous track"><i class="fa-solid fa-backward"></i></button>
            <button onclick="playPause()" class="control-btn master-play-btn" id="playBtn" aria-label="Toggle playback state state"><i class="fa-solid fa-play" id="controlIcon"></i></button>
            <button onclick="nextSong()" class="control-btn secondary-btn" aria-label="Skip to next track"><i class="fa-solid fa-forward"></i></button>
        </div>

        <div class="volume-system-module">
            <i class="fa-solid fa-volume-down volume-icon"></i>
            <div class="slider-fill-container">
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1" aria-label="Master audio volume output adjustments range controller">
            </div>
            <i class="fa-solid fa-volume-up volume-icon"></i>
        </div>
    </div>
</div>

<script>
const progress = document.getElementById("progress");
const song = document.getElementById("song");
const controlIcon = document.getElementById("controlIcon");
const playBtn = document.getElementById("playBtn");
const diskWrapper = document.getElementById("diskWrapper");

const title = document.getElementById("title");
const artist = document.getElementById("artist");
const cover = document.getElementById("cover");
const currentTimeDisplay = document.getElementById("currentTime");
const durationTimeDisplay = document.getElementById("durationTime");
const volumeSlider = document.getElementById("volumeSlider");

const playlist = [
    {
        title: "Chalo door kahin",
        artist: "Samar Jafari",
        src: "audio 1.mpeg.mp3",
        cover: "musicplayer.jpg"
    },
    {
        title: "Tum na ho",
        artist: "Aashir Wajahat & Samar Jafari",
        src: "audio 2.mpeg.mp3",
        cover: "musicplayer.jpg"
    }
];

let currentSongIndex = 0;
let isDragging = false; 

function formatTime(seconds) {
    if (isNaN(seconds)) return "0:00";
    let min = Math.floor(seconds / 60);
    let sec = Math.floor(seconds % 60);
    return `${min}:${sec < 10 ? '0' : ''}${sec}`;
}

song.onloadedmetadata = function() {
    progress.max = song.duration;
    progress.value = song.currentTime;
    durationTimeDisplay.innerText = formatTime(song.duration);
    updateTimelineFill();
};

function loadSong(index) {
    song.src = playlist[index].src;
    title.innerText = playlist[index].title;
    artist.innerText = playlist[index].artist;
    
    song.load(); 
    song.play();
    
    controlIcon.className = "fa-solid fa-pause";
    playBtn.classList.add("playing");
    diskWrapper.classList.add("rotating");
}

function nextSong() {
    currentSongIndex = (currentSongIndex + 1) % playlist.length;
    loadSong(currentSongIndex);
}

function prevSong() {
    currentSongIndex = (currentSongIndex - 1 + playlist.length) % playlist.length;
    loadSong(currentSongIndex);
}

function playPause() {
    if (song.paused) {
        song.play();
        controlIcon.className = "fa-solid fa-pause";
        playBtn.classList.add("playing");
        diskWrapper.classList.add("rotating");
    } else {
        song.pause();
        controlIcon.className = "fa-solid fa-play";
        playBtn.classList.remove("playing");
        diskWrapper.classList.remove("rotating");
    }
}

function updateTimelineFill() {
    const ratio = (progress.value / progress.max) * 100;
    progress.style.setProperty('--track-fill-percentage', `${ratio}%`);
}

function updateVolumeFill() {
    const ratio = (volumeSlider.value / volumeSlider.max) * 100;
    volumeSlider.style.setProperty('--volume-fill-percentage', `${ratio}%`);
}

song.ontimeupdate = function() {
    if (!isDragging) {
        progress.value = song.currentTime;
        updateTimelineFill();
    }
    currentTimeDisplay.innerText = formatTime(song.currentTime);
};

progress.oninput = function() {
    isDragging = true;
    song.currentTime = progress.value;
    currentTimeDisplay.innerText = formatTime(song.currentTime);
    updateTimelineFill();
};

progress.onchange = function() {
    isDragging = false;
    if (!song.paused) {
        song.play();
    }
};

song.onended = function() {
    nextSong();
};

volumeSlider.oninput = function() {
    song.volume = volumeSlider.value;
    updateVolumeFill();
};

window.onload = function() {
    title.innerText = playlist[currentSongIndex].title;
    artist.innerText = playlist[currentSongIndex].artist;
    song.src = playlist[currentSongIndex].src;
    updateTimelineFill();
    updateVolumeFill();
}
</script>
</body>
</html>
