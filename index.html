<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">    <link rel="stylesheet" href="music.css">
    <title>Music Player</title>
</head>
<body>
    <div class="card">
        <div class="play">
            <header>
                <div><i class="fa-solid fa-angle-left"></i></div>
                <h1>Now Playing</h1>
                <div><i class="fa-solid fa-bars"></i></div>
            </header>
            
            <img src="musicplayer.jpg" id="cover" alt="Album Art" onerror="this.src='[https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=400&auto=format&fit=crop](https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=400&auto=format&fit=crop)'">
            
            <h2 id="title">Song Title</h2>
            <p id="artist">Artist Name</p>

            <div class="aud"> 
                <audio id="song">
                    <source src="">
                </audio>
            </div>    
            
            <div class="time-display">
                <span id="currentTime">0:00</span>
                <span id="durationTime">0:00</span>
            </div>

            <input type="range" value="0" id="progress">
            
            <div class="control">
                <div onclick="prevSong()"><i class="fa-solid fa-backward"></i></div>
                <div onclick="playPause()"><i class="fa-solid fa-play" id="controlIcon"></i></div>
                <div onclick="nextSong()"><i class="fa-solid fa-forward"></i></div>
            </div>

            <div class="volume-container">
                <i class="fa-solid fa-volume-down"></i>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
                <i class="fa-solid fa-volume-up"></i>
            </div>
        </div>
    </div>

<script>
const progress = document.getElementById("progress");
const song = document.getElementById("song");
const controlIcon = document.getElementById("controlIcon");

const title = document.getElementById("title");
const artist = document.getElementById("artist");
const cover = document.getElementById("cover");
const currentTimeDisplay = document.getElementById("currentTime");
const durationTimeDisplay = document.getElementById("durationTime");
const volumeSlider = document.getElementById("volumeSlider");

const playlist = [
    {
        title: "Chalo door kahin",
        artist: "Samar Jafari",
        src: "audio 1.mpeg.mp3",
        cover: "musicplayer.jpg"
    },
    {
        title: "Tum na ho ",
        artist: "aashir whajhat and samar jafari",
        src: "audio 2.mpeg.mp3",
        cover: "musicplayer.jpg"
    }

];

let currentSongIndex = 0;
let isDragging = false; 

function formatTime(seconds) {
    let min = Math.floor(seconds / 60);
    let sec = Math.floor(seconds % 60);
    if (sec < 10) {
        sec = `0${sec}`;
    }
    return `${min}:${sec}`;
}

song.onloadedmetadata = function() {
    progress.max = song.duration;
    progress.value = song.currentTime;
    durationTimeDisplay.innerText = formatTime(song.duration);
};

function loadSong(index) {
    song.src = playlist[index].src;
    title.innerText = playlist[index].title;
    artist.innerText = playlist[index].artist;
    
    song.load(); 
    song.play();
    
    controlIcon.classList.add("fa-pause");
    controlIcon.classList.remove("fa-play");
}

function nextSong() {
    currentSongIndex++;
    if (currentSongIndex > playlist.length - 1) {
        currentSongIndex = 0;
    }
    loadSong(currentSongIndex);
}

function prevSong() {
    currentSongIndex--;
    if (currentSongIndex < 0) {
        currentSongIndex = playlist.length - 1;
    }
    loadSong(currentSongIndex);
}

function playPause() {
    if (song.paused) {
        song.play();
        controlIcon.classList.add("fa-pause");
        controlIcon.classList.remove("fa-play");
    } else {
        song.pause();
        controlIcon.classList.add("fa-play");
        controlIcon.classList.remove("fa-pause");
    }
}

song.ontimeupdate = function() {
    if (!isDragging) {
        progress.value = song.currentTime;
    }
    currentTimeDisplay.innerText = formatTime(song.currentTime);
};

progress.oninput = function() {
    isDragging = true;
    song.currentTime = progress.value;
    currentTimeDisplay.innerText = formatTime(song.currentTime);
};

progress.onchange = function() {
    isDragging = false;
    if (controlIcon.classList.contains("fa-pause")) {
        song.play();
    }
};

song.onended = function() {
    nextSong();
};

volumeSlider.oninput = function() {
    song.volume = volumeSlider.value;
};

window.onload = function() {
    title.innerText = playlist[currentSongIndex].title;
    artist.innerText = playlist[currentSongIndex].artist;
    song.src = playlist[currentSongIndex].src;
}
</script>
</body>
</html>
